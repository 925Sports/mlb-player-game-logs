<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        MLB 2026 Player Game Logs
      </h1>
      <div id="status" class="text-sm font-medium text-emerald-400"></div>
    </div>

    <div class="flex gap-4 border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab-batters" class="tab-active px-6 py-3 text-lg font-medium">Batters</button>
      <button onclick="switchTab(1)" id="tab-pitchers" class="px-6 py-3 text-lg font-medium">Pitchers</button>
    </div>

    <div id="debug" class="mb-4 p-3 bg-zinc-900 rounded text-xs"></div>
    <div id="table-container" class="bg-zinc-900 rounded-xl shadow-xl"></div>
  </div>

  <!-- Load libraries BEFORE our code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>

  <script>
    let gameLogData = [];
    let perInningData = [];
    let tableInstance;
    let currentTab = 0;

    const GAME_LOG_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv";
    const PER_INNING_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_per_inning_logs.csv";

    async function loadAllData() {
      const status = document.getElementById("status");
      const debug = document.getElementById("debug");

      status.textContent = "Loading CSVs...";

      try {
        const [gameResponse, perResponse] = await Promise.all([
          fetch(GAME_LOG_URL),
          fetch(PER_INNING_URL)
        ]);

        if (!gameResponse.ok || !perResponse.ok) {
          throw new Error("Failed to fetch one or both CSVs");
        }

        const gameText = await gameResponse.text();
        const perText = await perResponse.text();

        gameLogData = Papa.parse(gameText, { header: true, dynamicTyping: true }).data;
        perInningData = Papa.parse(perText, { header: true, dynamicTyping: true }).data;

        debug.innerHTML = `
          ✅ Game logs: ${gameLogData.length} rows<br>
          ✅ Per-inning: ${perInningData.length} rows<br>
          Latest game date: ${gameLogData[0]?.gameDate || 'N/A'}
        `;

        status.textContent = "✅ Data loaded";
        buildTable();
      } catch (error) {
        status.innerHTML = `❌ Error: ${error.message}`;
        console.error(error);
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-batters").classList.toggle("tab-active", tab === 0);
      document.getElementById("tab-pitchers").classList.toggle("tab-active", tab === 1);
      buildTable();
    }

    function buildTable() {
      if (tableInstance) tableInstance.destroy();

      const columns = currentTab === 0 ? [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "AB", field: "atBats", width: 60, hozAlign: "center"},
        {title: "H", field: "hits", width: 60, hozAlign: "center"},
        {title: "HR", field: "homeRuns", width: 60, hozAlign: "center"},
        {title: "RBI", field: "rbi", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOuts", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBalls", width: 60, hozAlign: "center"},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ] : [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "IP", field: "inningsPitched", width: 70, hozAlign: "center"},
        {title: "ER", field: "earnedRuns", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOutsPitching", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBallsPitching", width: 60, hozAlign: "center"},
        {title: "Decision", field: "note", width: 140},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ];

      const filteredData = gameLogData.filter(row => {
        if (currentTab === 0) return row.atBats != null;
        return row.inningsPitched != null;
      });

      tableInstance = new Tabulator("#table-container", {
        data: filteredData,
        columns: columns,
        layout: "fitColumns",
        pagination: "local",
        paginationSize: 25,
        initialSort: [{column: "gameDate", dir: "desc"}],
        rowClick: function(e, row) {
          togglePerInning(row);
        }
      });
    }

    function togglePerInning(row) {
      const existing = row.getElement().nextElementSibling;
      if (existing && existing.classList.contains("detail-row")) {
        existing.remove();
        return;
      }

      const gamePk = row.getData().gamePk;
      const playerId = row.getData().playerId;

      const details = perInningData.filter(p => 
        String(p.gamePk) === String(gamePk) && 
        (currentTab === 0 ? String(p.batterId) === String(playerId) : String(p.pitcherId) === String(playerId))
      );

      if (details.length === 0) {
        alert("No per-inning data available for this player in this game.");
        return;
      }

      const detailHTML = `
        <tr class="detail-row bg-zinc-800">
          <td colspan="20" class="p-4">
            <h4 class="font-semibold text-cyan-300 mb-3">Per-Inning / At-Bat Details</h4>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="bg-zinc-900">
                    <th class="p-3 text-left">Inning</th>
                    <th class="p-3 text-left">Result</th>
                    <th class="p-3 text-left">Description</th>
                    <th class="p-3 text-center">Pitches</th>
                  </tr>
                </thead>
                <tbody>
                  ${details.map(d => `
                    <tr class="border-t border-zinc-700">
                      <td class="p-3">${d.inning}</td>
                      <td class="p-3">${d.atBatResult}</td>
                      <td class="p-3">${d.description || '-'}</td>
                      <td class="p-3 text-center">${d.pitchesInAB || '-'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </td>
        </tr>
      `;

      const newRow = document.createElement("tr");
      newRow.className = "detail-row";
      newRow.innerHTML = detailHTML;
      row.getElement().after(newRow);
    }

    // Start the app
    window.onload = loadAllData;
  </script>
</body>
</html>
