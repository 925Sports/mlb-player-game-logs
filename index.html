<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
      MLB 2026 Player Game Logs
    </h1>

    <div class="flex gap-6 border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab0" class="tab-active px-8 py-3 text-lg">Batters</button>
      <button onclick="switchTab(1)" id="tab1" class="px-8 py-3 text-lg">Pitchers</button>
    </div>

    <div id="status" class="mb-4 text-emerald-400"></div>
    <div id="table" class="bg-zinc-900 rounded-xl"></div>
  </div>

  <!-- Load libraries first -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>

  <script>
    let data = [];
    let perInning = [];
    let tbl;
    let tab = 0;

    async function init() {
      document.getElementById("status").textContent = "Loading data...";
      try {
        const [g, p] = await Promise.all([
          fetch("https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv"),
          fetch("https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_per_inning_logs.csv")
        ]);

        data = Papa.parse(await g.text(), {header: true, dynamicTyping: true}).data;
        perInning = Papa.parse(await p.text(), {header: true, dynamicTyping: true}).data;

        document.getElementById("status").innerHTML = `✅ Loaded ${data.length} rows`;
        buildTable();
      } catch(e) {
        document.getElementById("status").innerHTML = `❌ Error: ${e.message}`;
      }
    }

    function switchTab(n) {
      tab = n;
      document.getElementById("tab0").classList.toggle("tab-active", n===0);
      document.getElementById("tab1").classList.toggle("tab-active", n===1);
      buildTable();
    }

    function buildTable() {
      if (tbl) tbl.destroy();

      const cols = tab === 0 ? [
        {title:"Date", field:"gameDate", width:110},
        {title:"Player", field:"fullName", width:220, headerFilter:"input"},
        {title:"Team", field:"home_team_abbreviation", width:80},
        {title:"AB", field:"atBats", width:60, hozAlign:"center"},
        {title:"H", field:"hits", width:60, hozAlign:"center"},
        {title:"HR", field:"homeRuns", width:60, hozAlign:"center"},
        {title:"RBI", field:"rbi", width:60, hozAlign:"center"},
        {title:"K", field:"strikeOuts", width:60, hozAlign:"center"},
        {title:"BB", field:"baseOnBalls", width:60, hozAlign:"center"},
        {title:"Summary", field:"gameLogSummary", minWidth:280}
      ] : [
        {title:"Date", field:"gameDate", width:110},
        {title:"Player", field:"fullName", width:220, headerFilter:"input"},
        {title:"Team", field:"home_team_abbreviation", width:80},
        {title:"IP", field:"inningsPitched", width:70, hozAlign:"center"},
        {title:"ER", field:"earnedRuns", width:60, hozAlign:"center"},
        {title:"K", field:"strikeOutsPitching", width:60, hozAlign:"center"},
        {title:"BB", field:"baseOnBallsPitching", width:60, hozAlign:"center"},
        {title:"Decision", field:"note", width:140},
        {title:"Summary", field:"gameLogSummary", minWidth:280}
      ];

      const filtered = data.filter(r => tab === 0 ? r.atBats != null : r.inningsPitched != null);

      tbl = new Tabulator("#table", {
        data: filtered,
        columns: cols,
        layout: "fitColumns",
        pagination: "local",
        paginationSize: 30,
        initialSort: [{column:"gameDate", dir:"desc"}],
        rowClick: (e, row) => showPerInning(row)
      });
    }

    function showPerInning(row) {
      const existing = row.getElement().nextElementSibling;
      if (existing && existing.classList.contains("detail")) existing.remove();

      const gp = row.getData().gamePk;
      const pid = row.getData().playerId;

      const details = perInning.filter(d => 
        String(d.gamePk) === String(gp) && 
        (tab === 0 ? String(d.batterId) === String(pid) : String(d.pitcherId) === String(pid))
      );

      if (!details.length) {
        alert("No per-inning data for this row yet.");
        return;
      }

      const html = `
        <tr class="detail bg-zinc-800">
          <td colspan="20" class="p-6">
            <h4 class="text-cyan-300 font-bold mb-4">Per-Inning / At-Bat Details</h4>
            <table class="w-full text-sm">
              <thead><tr class="bg-zinc-900"><th class="p-3 text-left">Inning</th><th class="p-3 text-left">Result</th><th class="p-3 text-left">Description</th><th class="p-3 text-center">Pitches</th></tr></thead>
              <tbody>
                ${details.map(d => `<tr class="border-t border-zinc-700"><td class="p-3">${d.inning}</td><td class="p-3">${d.atBatResult}</td><td class="p-3">${d.description||'-'}</td><td class="p-3 text-center">${d.pitchesInAB||'-'}</td></tr>`).join('')}
              </tbody>
            </table>
          </td>
        </tr>
      `;

      const tr = document.createElement("tr");
      tr.className = "detail";
      tr.innerHTML = html;
      row.getElement().after(tr);
    }

    window.onload = init;
  </script>
</body>
</html>
