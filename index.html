<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs - DEBUG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-8 font-mono">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">MLB Game Log Tool — DEBUG MODE</h1>
    
    <button onclick="loadData()" 
            class="bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-lg text-black font-semibold mb-6">
      🔄 Reload Data
    </button>

    <div id="status" class="text-lg mb-4"></div>
    <div id="error-details" class="bg-red-950 border border-red-500 p-4 rounded-lg text-red-300 text-sm"></div>
  </div>

  <script>
    async function loadData() {
      const status = document.getElementById("status");
      const details = document.getElementById("error-details");
      status.textContent = "🔄 Fetching CSV...";
      details.innerHTML = "";

      const url = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv?" + Date.now();

      try {
        const res = await fetch(url);
        console.log("Fetch response:", res.status, res.statusText);

        if (!res.ok) throw new Error(`HTTP ${res.status} - ${res.statusText}`);

        const text = await res.text();
        const rows = text.trim().split('\n').length;

        status.innerHTML = `✅ SUCCESS! Loaded <span class="text-emerald-400">${rows}</span> rows`;
        details.innerHTML = `<span class="text-emerald-400">CSV loaded perfectly. Table should appear now.</span>`;
      } catch (err) {
        status.innerHTML = `❌ FAILED TO LOAD CSV`;
        details.innerHTML = `
          <strong>Error:</strong> ${err.message}<br>
          <strong>URL tried:</strong> ${url}<br><br>
          <strong>What to do:</strong><br>
          1. Try in Incognito mode<br>
          2. Disable ad-blockers / extensions<br>
          3. Try a different browser
        `;
        console.error("Full fetch error:", err);
      }
    }

    // Auto-run on page load
    window.onload = loadData;
  </script>
</body>
</html>
