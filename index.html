<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
      MLB 2026 Player Game Logs
    </h1>

    <div class="flex gap-6 border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab0" class="tab-active px-8 py-3 text-lg font-medium">Batters</button>
      <button onclick="switchTab(1)" id="tab1" class="px-8 py-3 text-lg font-medium">Pitchers</button>
    </div>

    <div id="status" class="mb-6 text-lg"></div>
    <div id="table-container" class="bg-zinc-900 rounded-2xl"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>

  <script>
    let gameData = [];
    let perInningData = [];
    let currentTable = null;
    let currentTab = 0;

    // Simple native CSV parser (no PapaParse)
    function simpleCSVParse(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = lines[i].split(',');
        const row = {};
        for (let j = 0; j < headers.length; j++) {
          row[headers[j]] = values[j] !== undefined ? values[j] : '';
        }
        result.push(row);
      }
      return result;
    }

    async function loadData() {
      const status = document.getElementById("status");
      status.innerHTML = "🔄 Loading CSVs... (this may take 10-20 seconds)";

      try {
        const [gameRes, perRes] = await Promise.all([
          fetch("https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv"),
          fetch("https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_per_inning_logs.csv")
        ]);

        const gameText = await gameRes.text();
        const perText = await perRes.text();

        gameData = simpleCSVParse(gameText);
        perInningData = simpleCSVParse(perText);

        status.innerHTML = `✅ Loaded <span class="text-emerald-400">${gameData.length}</span> rows`;
        buildTable();
      } catch (err) {
        status.innerHTML = `❌ Failed to load: ${err.message}`;
        console.error(err);
      }
    }

    function switchTab(n) {
      currentTab = n;
      document.getElementById("tab0").classList.toggle("tab-active", n === 0);
      document.getElementById("tab1").classList.toggle("tab-active", n === 1);
      buildTable();
    }

    function buildTable() {
      if (currentTable) currentTable.destroy();

      const columns = currentTab === 0 ? [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "AB", field: "atBats", width: 60, hozAlign: "center"},
        {title: "H", field: "hits", width: 60, hozAlign: "center"},
        {title: "HR", field: "homeRuns", width: 60, hozAlign: "center"},
        {title: "RBI", field: "rbi", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOuts", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBalls", width: 60, hozAlign: "center"},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ] : [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "IP", field: "inningsPitched", width: 70, hozAlign: "center"},
        {title: "ER", field: "earnedRuns", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOutsPitching", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBallsPitching", width: 60, hozAlign: "center"},
        {title: "Decision", field: "note", width: 160},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ];

      const filtered = gameData.filter(row => currentTab === 0 ? row.atBats != null : row.inningsPitched != null);

      currentTable = new Tabulator("#table-container", {
        data: filtered,
        columns: columns,
        layout: "fitColumns",
        pagination: "local",
        paginationSize: 25,
        initialSort: [{column: "gameDate", dir: "desc"}],
        rowClick: function(e, row) { togglePerInning(row); }
      });
    }

    function togglePerInning(row) {
      const existing = row.getElement().nextElementSibling;
      if (existing && existing.classList.contains("detail-row")) {
        existing.remove();
        return;
      }

      const gamePk = row.getData().gamePk;
      const playerId = row.getData().playerId;

      const details = perInningData.filter(d => 
        String(d.gamePk) === String(gamePk) &&
        (currentTab === 0 ? String(d.batterId) === String(playerId) : String(d.pitcherId) === String(playerId))
      );

      if (details.length === 0) {
        alert("No per-inning data for this player/game yet.");
        return;
      }

      const html = `
        <tr class="detail-row bg-zinc-800">
          <td colspan="20" class="p-6">
            <h4 class="font-semibold text-cyan-300 mb-4">Per-Inning / At-Bat Details</h4>
            <table class="w-full text-sm">
              <thead><tr class="bg-zinc-900"><th class="p-3 text-left">Inning</th><th class="p-3 text-left">Result</th><th class="p-3 text-left">Description</th><th class="p-3 text-center">Pitches</th></tr></thead>
              <tbody>
                ${details.map(d => `
                  <tr class="border-t border-zinc-700">
                    <td class="p-3">${d.inning}</td>
                    <td class="p-3">${d.atBatResult}</td>
                    <td class="p-3">${d.description || '-'}</td>
                    <td class="p-3 text-center">${d.pitchesInAB || '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </td>
        </tr>
      `;

      const newRow = document.createElement("tr");
      newRow.className = "detail-row";
      newRow.innerHTML = html;
      row.getElement().after(newRow);
    }

    window.onload = loadData;
  </script>
</body>
</html>
