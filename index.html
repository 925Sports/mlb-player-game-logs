<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { border-bottom: 4px solid #22d3ee; color: #67e8f9; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
        MLB 2026 Player Game Logs
      </h1>
      <div id="status" class="text-sm font-medium text-emerald-400"></div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 border-b border-zinc-700 mb-6">
      <button onclick="switchTab(0)" id="tab-batters" class="tab-active px-6 py-3 text-lg font-medium">Batters</button>
      <button onclick="switchTab(1)" id="tab-pitchers" class="px-6 py-3 text-lg font-medium">Pitchers</button>
    </div>

    <div id="debug-info" class="mb-4 text-xs bg-zinc-900 p-3 rounded-lg"></div>
    <div id="table-container" class="bg-zinc-900 rounded-xl shadow-xl overflow-hidden"></div>
  </div>

  <script>
    let gameLogData = [];
    let table;
    let currentTab = 0;

    const CSV_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv";

    async function loadData() {
      const statusEl = document.getElementById("status");
      statusEl.textContent = "Loading CSVs...";

      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        gameLogData = Papa.parse(text, {header: true, dynamicTyping: true}).data;

        // Debug info
        console.log("✅ Loaded rows:", gameLogData.length);
        console.log("First row columns:", Object.keys(gameLogData[0] || {}));

        document.getElementById("debug-info").innerHTML = `
          <strong>✅ Data loaded successfully</strong><br>
          Total rows in CSV: <span class="text-cyan-400">${gameLogData.length}</span><br>
          Date range: ${gameLogData[0]?.gameDate} to ${gameLogData[gameLogData.length-1]?.gameDate}
        `;

        statusEl.innerHTML = `✅ <span class="text-emerald-400">${gameLogData.length} rows loaded</span>`;
        buildTable();
      } catch (err) {
        console.error("Load error:", err);
        statusEl.innerHTML = `❌ Error loading CSV: ${err.message}`;
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-batters").classList.toggle("tab-active", tab === 0);
      document.getElementById("tab-pitchers").classList.toggle("tab-active", tab === 1);
      buildTable();
    }

    function buildTable() {
      if (table) table.destroy();

      const columns = currentTab === 0 ? [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "AB", field: "atBats", width: 60, hozAlign: "center"},
        {title: "H", field: "hits", width: 60, hozAlign: "center"},
        {title: "HR", field: "homeRuns", width: 60, hozAlign: "center"},
        {title: "RBI", field: "rbi", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOuts", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBalls", width: 60, hozAlign: "center"},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ] : [
        {title: "Date", field: "gameDate", width: 110},
        {title: "Player", field: "fullName", width: 220, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 80},
        {title: "IP", field: "inningsPitched", width: 70, hozAlign: "center"},
        {title: "ER", field: "earnedRuns", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOutsPitching", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBallsPitching", width: 60, hozAlign: "center"},
        {title: "Decision", field: "note", width: 140},
        {title: "Summary", field: "gameLogSummary", minWidth: 300}
      ];

      // Relaxed filter so we actually see data
      const filteredData = gameLogData.filter(row => {
        if (currentTab === 0) return (row.atBats || row.atBats === 0);
        return (row.inningsPitched || row.inningsPitched === 0);
      });

      console.log(`Tab ${currentTab} filtered to ${filteredData.length} rows`);

      table = new Tabulator("#table-container", {
        data: filteredData,
        columns: columns,
        layout: "fitColumns",
        pagination: "local",
        paginationSize: 25,
        initialSort: [{column: "gameDate", dir: "desc"}]
      });
    }

    loadData();
  </script>
</body>
</html>
