<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB 2026 Player Game Logs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.2.1/js/tabulator.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.2.1/css/tabulator.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .tab-active { border-bottom: 3px solid #1e40af; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">MLB 2026 Player Game Logs</h1>
    
    <div class="flex border-b border-gray-700 mb-6">
        <button onclick="switchTab(0)" id="tab-batters" class="tab-active px-8 py-3 text-lg">Batters</button>
        <button onclick="switchTab(1)" id="tab-pitchers" class="px-8 py-3 text-lg">Pitchers</button>
    </div>

    <div id="status" class="mb-4 text-sm text-gray-400"></div>
    <div id="table-container"></div>
</div>

<script>
// === CONFIG ===
const CSV_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv";

// Global variables
let allData = [];
let currentTab = 0; // 0 = Batters, 1 = Pitchers
let table = null;

// Switch between tabs
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-batters').classList.toggle('tab-active', tab === 0);
    document.getElementById('tab-pitchers').classList.toggle('tab-active', tab === 1);
    buildTable();
}

// Build the Tabulator table with correct filtering
function buildTable() {
    const container = document.getElementById('table-container');
    container.innerHTML = '';

    // Filter data
    let filteredData = allData.filter(row => {
        const pos = (row.primaryPosition_name || "").toLowerCase();
        const isPitcher = pos.includes("pitcher") || 
                         (row.inningsPitched && row.inningsPitched.toString().trim() !== "" && row.inningsPitched !== "0");
        
        if (currentTab === 0) { // Batters tab
            return !isPitcher && (row.atBats || row.atBats === 0);
        } else { // Pitchers tab
            return isPitcher;
        }
    });

    // Define columns - different for each tab
    let columns = [
        { title: "Date", field: "gameDate", width: 110, sorter: "date", sorterParams: {format: "yyyy-MM-dd"} },
        { title: "Player", field: "fullName", width: 220, headerFilter: "input" },
        { title: "Team", field: "teamAbbrev", width: 80 },
        { title: "Position", field: "primaryPosition_name", width: 120 }
    ];

    if (currentTab === 0) { // Batters columns
        columns = columns.concat([
            { title: "AB", field: "atBats", width: 70 },
            { title: "H", field: "hits", width: 70 },
            { title: "HR", field: "homeRuns", width: 70 },
            { title: "RBI", field: "rbi", width: 70 },
            { title: "R", field: "runs", width: 70 },
            { title: "K", field: "strikeOuts", width: 70 },
            { title: "BB", field: "baseOnBalls", width: 70 },
            { title: "SB", field: "stolenBases", width: 70 },
            { title: "Summary", field: "gameLogSummary", minWidth: 250, formatter: "plaintext" }
        ]);
    } else { // Pitchers columns
        columns = columns.concat([
            { title: "IP", field: "inningsPitched", width: 80 },
            { title: "ER", field: "earnedRuns", width: 70 },
            { title: "H", field: "hitsAllowed", width: 70 },
            { title: "HR", field: "homeRunsAllowed", width: 70 },
            { title: "K", field: "strikeOutsPitching", width: 70 },
            { title: "BB", field: "baseOnBallsPitching", width: 70 },
            { title: "Pitches", field: "pitchesThrown", width: 90 },
            { title: "Decision", field: "note", width: 100 },
            { title: "Summary", field: "gameLogSummary", minWidth: 250, formatter: "plaintext" }
        ]);
    }

    table = new Tabulator("#table-container", {
        data: filteredData,
        columns: columns,
        layout: "fitColumns",
        pagination: "local",
        paginationSize: 50,
        paginationSizeSelector: [25, 50, 100, 250],
        initialSort: [{column: "gameDate", dir: "desc"}],
        headerFilterLiveFilterDelay: 300,
        responsiveLayout: "collapse",
    });
}

// Load CSV and initialize
async function init() {
    const statusEl = document.getElementById('status');
    statusEl.textContent = "🔄 Loading latest data...";

    try {
        const response = await fetch(CSV_URL + "?t=" + Date.now());
        const text = await response.text();
        
        // Simple CSV parser (no PapaParse dependency)
        const lines = text.trim().split('\n');
        const headers = lines[0].split(',');
        allData = [];
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const row = {};
            headers.forEach((header, index) => {
                row[header.trim()] = values[index] ? values[index].replace(/^"|"$/g, '').trim() : '';
            });
            allData.push(row);
        }

        statusEl.innerHTML = `✅ Loaded <strong>${allData.length}</strong> player game logs`;
        buildTable(); // Build initial Batters tab
        
    } catch (err) {
        console.error(err);
        statusEl.innerHTML = `❌ Failed to load data: ${err.message}`;
    }
}

// Start when page loads
window.onload = init;
</script>

</body>
</html>
