<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .header-gradient { background: linear-gradient(90deg, #1e3a8a, #3b82f6); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">
  <div class="header-gradient py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <i class="fas fa-baseball-ball text-4xl"></i>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">MLB 2026 Player Game Logs</h1>
          <p class="text-blue-200 text-sm">Live • Searchable • Updated Daily</p>
        </div>
      </div>
      <div id="last-updated" class="text-sm bg-white/10 px-4 py-2 rounded-full backdrop-blur-md"></div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-6">
      <input id="searchInput" type="text" 
             class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-5 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
             placeholder="Search player name or team...">
      
      <button onclick="filterByType('all')" 
              class="active-filter px-6 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 font-medium">All</button>
      <button onclick="filterByType('hitter')" 
              class="px-6 py-3 rounded-2xl bg-gray-800 hover:bg-gray-700 font-medium">Hitters</button>
      <button onclick="filterByType('pitcher')" 
              class="px-6 py-3 rounded-2xl bg-gray-800 hover:bg-gray-700 font-medium">Pitchers</button>
      
      <button onclick="exportCSV()" 
              class="ml-auto flex items-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium">
        <i class="fas fa-download"></i> Export CSV
      </button>
    </div>

    <!-- Table Container -->
    <div id="loading" class="text-center py-20 text-gray-400">
      <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
      <p class="text-lg">Loading latest 2026 MLB game logs...</p>
    </div>

    <div id="table" class="hidden"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv";
    let tableInstance;
    let allData = [];

    function filterByType(type) {
      if (!tableInstance) return;
      
      if (type === 'all') {
        tableInstance.setFilter();
      } else if (type === 'hitter') {
        tableInstance.setFilter("inningsPitched", "=", "");
      } else if (type === 'pitcher') {
        tableInstance.setFilter("atBats", "=", "");
      }
    }

    function exportCSV() {
      if (!tableInstance) return;
      tableInstance.download("csv", "mlb_2026_player_game_logs.csv");
    }

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function(results) {
        allData = results.data;
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("table").classList.remove("hidden");

        // Show last updated
        const latestDate = allData[0]?.gameDate || "2026-04-13";
        document.getElementById("last-updated").innerHTML = `
          <i class="fas fa-clock"></i> Last updated: <strong>${latestDate}</strong>
        `;

        tableInstance = new Tabulator("#table", {
          data: allData,
          layout: "fitColumns",
          responsiveLayout: "collapse",
          pagination: "local",
          paginationSize: 50,
          paginationSizeSelector: [25, 50, 100, 250],
          initialSort: [{column: "gameDate", dir: "desc"}],
          height: "calc(100vh - 280px)",
          columns: [
            {title: "Date", field: "gameDate", width: 110, sorter: "date"},
            {title: "Player", field: "fullName", width: 190, headerFilter: "input", minWidth: 160},
            {title: "Team", field: "home_team_abbreviation", width: 85, headerFilter: "input"},
            {title: "Pos", field: "primaryPosition_name", width: 90},
            {title: "AB", field: "atBats", width: 70, hozAlign: "center"},
            {title: "H", field: "hits", width: 70, hozAlign: "center"},
            {title: "HR", field: "homeRuns", width: 70, hozAlign: "center"},
            {title: "RBI", field: "rbi", width: 70, hozAlign: "center"},
            {title: "R", field: "runs", width: 70, hozAlign: "center"},
            {title: "BB", field: "baseOnBalls", width: 70, hozAlign: "center"},
            {title: "SO", field: "strikeOuts", width: 70, hozAlign: "center"},
            {title: "SB", field: "stolenBases", width: 70, hozAlign: "center"},
            {title: "Summary", field: "gameLogSummary", minWidth: 220, headerFilter: "input"},
            {title: "IP", field: "inningsPitched", width: 80, hozAlign: "center"},
            {title: "ER", field: "earnedRuns", width: 70, hozAlign: "center"},
            {title: "K", field: "strikeOutsPitching", width: 70, hozAlign: "center"},
            {title: "Decision", field: "note", width: 130},
          ],
          headerFilterLiveFilterDelay: 200,
          tooltips: true,
        });
      },
      error: function() {
        document.getElementById("loading").innerHTML = `
          <i class="fas fa-exclamation-triangle text-4xl mb-4 text-red-500"></i>
          <p class="text-xl">Could not load data. Make sure the CSV file exists in the repo.</p>
        `;
      }
    });
  </script>
</body>
</html>
