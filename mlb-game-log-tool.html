<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB 2026 Player Game Logs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .header-gradient { background: linear-gradient(90deg, #1e3a8a, #3b82f6); }
    .tab-active { background-color: #1e3a8a; color: white; border-bottom: 3px solid #60a5fa; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">
  <div class="header-gradient py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <i class="fas fa-baseball-ball text-4xl"></i>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">MLB 2026 Player Game Logs</h1>
          <p class="text-blue-200 text-sm">Fantasy • DFS • Props • Updated Daily</p>
        </div>
      </div>
      <div id="last-updated" class="text-sm bg-white/10 px-4 py-2 rounded-full backdrop-blur-md"></div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Tabs -->
    <div class="flex border-b border-gray-700 mb-6 text-lg">
      <button onclick="switchTab(0)" id="tab-batters" class="tab-active px-10 py-4 font-medium flex-1 md:flex-none">Batters</button>
      <button onclick="switchTab(1)" id="tab-pitchers" class="px-10 py-4 font-medium flex-1 md:flex-none">Pitchers</button>
    </div>

    <!-- Search & Export -->
    <div class="flex flex-wrap gap-3 mb-6">
      <input id="searchInput" type="text" 
             class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-5 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
             placeholder="Search player or matchup...">
      
      <button onclick="exportCSV()" 
              class="flex items-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium">
        <i class="fas fa-download"></i> Export CSV
      </button>
    </div>

    <div id="loading" class="text-center py-20 text-gray-400">
      <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
      <p class="text-lg">Loading 2026 season game logs...</p>
    </div>

    <div id="table" class="hidden"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = "https://raw.githubusercontent.com/925Sports/mlb-player-game-logs/main/mlb_2026_season_game_logs.csv";
    let tableInstance;
    let allData = [];
    let currentTab = 0; // 0 = Batters, 1 = Pitchers

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-batters').classList.toggle('tab-active', tab === 0);
      document.getElementById('tab-pitchers').classList.toggle('tab-active', tab === 1);
      buildTable();
    }

    function calculateFPTS(row) {
      return (row.hits || 0) * 1 +
             (row.doubles || 0) * 2 +
             (row.triples || 0) * 3 +
             (row.homeRuns || 0) * 4 +
             (row.runs || 0) * 1 +
             (row.rbi || 0) * 1 +
             (row.baseOnBalls || 0) * 1 +
             (row.stolenBases || 0) * 1 -
             (row.strikeOuts || 0) * 0.5;
    }

    function buildTable() {
      let displayData = allData;

      if (currentTab === 0) { // Batters
        displayData = allData.filter(r => r.atBats !== "" && r.atBats != null);
      } else if (currentTab === 1) { // Pitchers
        displayData = allData.filter(r => r.inningsPitched !== "" && r.inningsPitched != null);
      }

      // Add calculated fields
      displayData = displayData.map(row => {
        const home = row.home_team_abbreviation || "";
        const away = row.away_team_abbreviation || "";
        const isHomeWin = row.home_isWinner === true;
        const score = `${row.home_score || 0}-${row.away_score || 0}`;
        const resultText = isHomeWin ? `W ${score}` : `L ${score}`;
        const resultColor = isHomeWin ? "text-green-400" : "text-red-400";

        return {
          ...row,
          matchup: `${away} @ ${home}`,
          result: `<span class="${resultColor} font-medium">${resultText}</span>`,
          fpts: currentTab === 0 ? calculateFPTS(row) : ""
        };
      });

      if (tableInstance) tableInstance.destroy();

      const batterColumns = [
        {title: "Date", field: "gameDate", width: 100},
        {title: "Player", field: "fullName", width: 190, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 85},
        {title: "Matchup", field: "matchup", width: 160},
        {title: "Result", field: "result", width: 110, formatter: "html"},
        {title: "FPTS", field: "fpts", width: 80, hozAlign: "center"},
        {title: "AB", field: "atBats", width: 60, hozAlign: "center"},
        {title: "R", field: "runs", width: 60, hozAlign: "center"},
        {title: "H", field: "hits", width: 60, hozAlign: "center"},
        {title: "2B", field: "doubles", width: 60, hozAlign: "center"},
        {title: "3B", field: "triples", width: 60, hozAlign: "center"},
        {title: "HR", field: "homeRuns", width: 60, hozAlign: "center"},
        {title: "RBI", field: "rbi", width: 60, hozAlign: "center"},
        {title: "BB", field: "baseOnBalls", width: 60, hozAlign: "center"},
        {title: "K", field: "strikeOuts", width: 60, hozAlign: "center"},
        {title: "SB", field: "stolenBases", width: 60, hozAlign: "center"},
        {title: "CS", field: "caughtStealing", width: 60, hozAlign: "center"},
        {title: "GIDP", field: "groundIntoDoublePlay", width: 70, hozAlign: "center"},
        {title: "PA", field: "plateAppearances", width: 70, hozAlign: "center"},
        {title: "Summary", field: "gameLogSummary", minWidth: 240, headerFilter: "input"}
      ];

      const pitcherColumns = [
        {title: "Date", field: "gameDate", width: 100},
        {title: "Player", field: "fullName", width: 190, headerFilter: "input"},
        {title: "Team", field: "home_team_abbreviation", width: 85},
        {title: "Matchup", field: "matchup", width: 160},
        {title: "Result", field: "result", width: 110, formatter: "html"},
        {title: "IP", field: "inningsPitched", width: 80, hozAlign: "center"},
        {title: "ER", field: "earnedRuns", width: 70, hozAlign: "center"},
        {title: "H", field: "hitsAllowed", width: 70, hozAlign: "center"},
        {title: "HR", field: "homeRunsAllowed", width: 70, hozAlign: "center"},
        {title: "K", field: "strikeOutsPitching", width: 70, hozAlign: "center"},
        {title: "BB", field: "baseOnBallsPitching", width: 70, hozAlign: "center"},
        {title: "Pitches", field: "pitchesThrown", width: 90, hozAlign: "center"},
        {title: "Decision", field: "note", width: 160}
      ];

      tableInstance = new Tabulator("#table", {
        data: displayData,
        layout: "fitColumns",
        responsiveLayout: "collapse",
        pagination: "local",
        paginationSize: 50,
        paginationSizeSelector: [25, 50, 100, 250],
        initialSort: [{column: "gameDate", dir: "desc"}],
        height: "calc(100vh - 300px)",
        columns: currentTab === 0 ? batterColumns : pitcherColumns,
        headerFilterLiveFilterDelay: 200,
        tooltips: true,
      });
    }

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      dynamicTyping: true,
      complete: function(results) {
        allData = results.data;
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("table").classList.remove("hidden");

        const latest = allData[0]?.gameDate || "2026-04-13";
        document.getElementById("last-updated").innerHTML = `
          <i class="fas fa-clock"></i> Last updated: <strong>${latest}</strong>
        `;

        buildTable();
      }
    });

    function exportCSV() {
      if (!tableInstance) return;
      const filename = currentTab === 0 ? "mlb_2026_batters_logs.csv" : "mlb_2026_pitchers_logs.csv";
      tableInstance.download("csv", filename);
    }
  </script>
</body>
</html>
