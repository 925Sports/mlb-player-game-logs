name: Daily MLB Per-Inning Data Pull

on:
  schedule:
    - cron: '0 5 * * *'      # Runs every day at 5 AM UTC (12 AM CDT)
  workflow_dispatch:         # Allows you to run it manually

jobs:
  per-inning-pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Per-Inning Pull
        run: python per_inning_main.py

      - name: Merge per-inning logs into one file
        run: python merge_per_inning.py

      - name: Commit and push files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.csv || true
          git commit -m "Daily per-inning update + merged file - $(date)" || echo "No changes"
          git push || true
