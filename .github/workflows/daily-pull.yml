name: Daily MLB Player Game Logs

on:
  schedule:
    - cron: '0 4 * * *'   # Runs at 4 AM UTC (~11 PM CDT)
  workflow_dispatch:

jobs:
  daily-pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run Daily Append
        run: python main.py

      - name: Commit and push new data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mlb_2026_season_game_logs.csv || true
          git commit -m "Daily MLB game logs append - $(date)" || echo "No new data"
          git push || true
