name: Daily MLB Player Game Logs

# Give the workflow permission to read and write to the repo
permissions:
  contents: write

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  daily-pull:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run main.py (pull yesterday's detailed boxscores)
        run: python main.py

      - name: Commit and push new data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "*.csv"
          git commit -m "Daily MLB game logs update - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
