name: Backfill MLB Per-Inning Logs

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run per-inning backfill
        run: python backfill_per_inning.py

      - name: Merge per-inning logs (separate file only)
        run: python merge_per_inning_logs.py || true

      - name: Commit and push new files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mlb_per_inning_logs_*.csv mlb_2026_per_inning_logs.csv
          git commit -m "Backfill per-inning logs up to $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push || true
