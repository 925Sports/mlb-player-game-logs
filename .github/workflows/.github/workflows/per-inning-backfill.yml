name: Backfill MLB Per-Inning Data (One-Time)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Per-Inning Backfill
        run: python backfill_per_inning.py

      - name: Merge all per-inning logs
        run: python merge_per_inning.py

      - name: Commit and push the merged file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mlb_2026_per_inning_logs.csv || true
          git commit -m "Backfill completed - full 2026 per-inning logs" || echo "No changes"
          git push || true
